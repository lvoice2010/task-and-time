<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дела — канбан + тайм-трекер</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #0B0E14;
      color: #E2E8F0;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
    .pulse { animation: pulse 1.2s ease-in-out infinite; }

    /* scrollbars */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    input, button, select { font-family: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; }
    input:focus, button:focus { outline: none; }

    .card-hover { transition: all 0.15s ease; }
    .card-hover:hover { background: rgba(255,255,255,0.04) !important; border-color: rgba(255,255,255,0.12) !important; }

    .btn-hover { transition: all 0.15s ease; }
    .btn-hover:hover { background: rgba(255,255,255,0.08) !important; }

    .drag-over { background: rgba(56,189,248,0.08) !important; border-color: rgba(56,189,248,0.3) !important; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
